<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>手かめ波AR</title>
  <style>
    :root {
      --bg: #05070b;
      --fg: #f5f7ff;
      --dim: rgba(245, 247, 255, .68);
      --panel: rgba(7, 12, 22, .62);
      --line: rgba(255, 255, 255, .14);
      --accent: #72e7ff;
      --accent2: #f6e16d;
      --danger: #ff6e9a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif; color: var(--fg); }
    body { touch-action: none; }

    #stage { position: fixed; inset: 0; background: radial-gradient(circle at 50% 40%, #152135 0%, #05070b 62%); }
    #video { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    #canvas { position: fixed; inset: 0; width: 100vw; height: 100dvh; display: block; }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }

    .pill {
      pointer-events: auto;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--fg);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing: .02em;
      box-shadow: 0 10px 30px rgba(0,0,0,.24);
    }

    button.pill { cursor: pointer; }
    button.pill:active { transform: translateY(1px); }

    #hud {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 5;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(7,12,22,.70), rgba(7,12,22,.48));
      backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 18px 50px rgba(0,0,0,.32);
    }

    #status {
      font-size: 13px;
      line-height: 1.48;
      color: var(--dim);
    }

    #status strong { color: var(--fg); font-weight: 700; }

    .meter-wrap {
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    #meter {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #73e7ff, #f6e16d, #fff);
      box-shadow: 0 0 20px rgba(114,231,255,.55), 0 0 40px rgba(246,225,109,.28);
      transition: width .06s linear;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 35%, rgba(105, 223, 255, .16), transparent 30%),
        radial-gradient(circle at 50% 75%, rgba(246, 225, 109, .12), transparent 35%),
        #05070b;
    }

    .card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      background: linear-gradient(180deg, rgba(15,22,36,.92), rgba(10,14,24,.78));
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
    }

    .card h1 { margin: 0 0 8px; font-size: 25px; line-height: 1.15; letter-spacing: -.04em; }
    .card p { margin: 10px 0; color: var(--dim); font-size: 14px; line-height: 1.65; }
    .card ol { margin: 14px 0 18px; padding-left: 1.4em; color: rgba(245,247,255,.84); font-size: 14px; line-height: 1.72; }

    #startBtn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      color: #061018;
      background: linear-gradient(90deg, #72e7ff, #f6e16d);
      box-shadow: 0 14px 40px rgba(114,231,255,.22);
      cursor: pointer;
    }
    #startBtn:disabled { opacity: .55; cursor: progress; }

    .small { font-size: 12px !important; color: rgba(245,247,255,.52) !important; }

    #error {
      display: none;
      margin-top: 12px;
      color: #ffd4dd;
      border: 1px solid rgba(255,110,154,.35);
      background: rgba(255,110,154,.10);
      border-radius: 14px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      mix-blend-mode: screen;
      transition: opacity .18s ease-out;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>
  <div id="flash"></div>

  <div class="topbar">
    <div class="pill" id="modeLabel">待機中</div>
    <button class="pill" id="flipBtn" type="button">カメラ切替</button>
  </div>

  <div id="hud">
    <div class="panel">
      <div class="meter-wrap"><div id="meter"></div></div>
      <div id="status">起動後、両手を胸の前で近づけてためる。左右に開くか、カメラへ押し出すと発射。</div>
    </div>
  </div>

  <div id="splash">
    <div class="card">
      <h1>手かめ波AR</h1>
      <p>カメラで手を追跡し、両手のため動作に合わせてエネルギー波を合成します。公式キャラクターや素材は使っていません。そこは大人の分別です。</p>
      <ol>
        <li>両手をカメラに映す</li>
        <li>両手を近づけて止めると、ため開始</li>
        <li>長くためるほどビームが太くなる</li>
        <li>両手を左右に開く、または前へ押し出すと発射</li>
      </ol>
      <button id="startBtn" type="button">カメラを起動</button>
      <p class="small">iPhoneではSafariまたはPWAで使用してください。カメラ権限の都合上、HTTPSまたはlocalhostで動かす必要があります。</p>
      <div id="error"></div>
    </div>
  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const splash = document.getElementById('splash');
    const startBtn = document.getElementById('startBtn');
    const flipBtn = document.getElementById('flipBtn');
    const errorBox = document.getElementById('error');
    const meter = document.getElementById('meter');
    const statusEl = document.getElementById('status');
    const modeLabel = document.getElementById('modeLabel');
    const flash = document.getElementById('flash');

    const MAX_CHARGE_MS = 3000;
    const MIN_FIRE_MS = 280;
    const CLOSE_DIST = 0.28;
    const OPEN_DIST = 0.40;
    const PUSH_SCALE = 1.18;
    const FIRE_DURATION = 780;

    let handLandmarker = null;
    let stream = null;
    let facingMode = 'user';
    let mirror = true;
    let running = false;
    let lastVideoTime = -1;
    let lastGoodHands = null;

    let state = 'idle';
    let chargeStart = 0;
    let chargeMs = 0;
    let chargeOrigin = null;
    let chargeBaseSize = 0;
    let chargeDirection = { x: 0, y: -1 };
    let noHandSince = 0;

    const beams = [];
    const particles = [];

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function dist(a, b) { const x = a.x - b.x; const y = a.y - b.y; return Math.hypot(x, y); }
    function now() { return performance.now(); }

    function setError(message) {
      errorBox.style.display = 'block';
      errorBox.textContent = message;
    }

    function resizeCanvas() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const w = Math.round(window.innerWidth * dpr);
      const h = Math.round(window.innerHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    window.addEventListener('resize', resizeCanvas, { passive: true });
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250), { passive: true });

    async function createLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm'
      );

      const baseOptions = {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task'
      };

      try {
        return await HandLandmarker.createFromOptions(vision, {
          baseOptions: { ...baseOptions, delegate: 'GPU' },
          runningMode: 'VIDEO',
          numHands: 2,
          minHandDetectionConfidence: 0.55,
          minHandPresenceConfidence: 0.55,
          minTrackingConfidence: 0.55
        });
      } catch (e) {
        return await HandLandmarker.createFromOptions(vision, {
          baseOptions,
          runningMode: 'VIDEO',
          numHands: 2,
          minHandDetectionConfidence: 0.55,
          minHandPresenceConfidence: 0.55,
          minTrackingConfidence: 0.55
        });
      }
    }

    async function startCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30, max: 60 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      mirror = facingMode === 'user';
    }

    async function boot() {
      startBtn.disabled = true;
      startBtn.textContent = '起動中…';
      setError('');
      errorBox.style.display = 'none';

      try {
        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error('このブラウザはカメラ取得に対応していません。Safari / Chrome の最新版で試してください。');
        }
        resizeCanvas();
        handLandmarker = handLandmarker || await createLandmarker();
        await startCamera();
        running = true;
        splash.style.display = 'none';
        requestAnimationFrame(loop);
      } catch (e) {
        startBtn.disabled = false;
        startBtn.textContent = 'もう一度起動';
        setError((e && e.message) ? e.message : String(e));
      }
    }

    startBtn.addEventListener('click', boot);

    flipBtn.addEventListener('click', async () => {
      if (!running) return;
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      modeLabel.textContent = 'カメラ切替中';
      try {
        await startCamera();
        resetGesture();
      } catch (e) {
        statusEl.innerHTML = 'カメラ切替に失敗。端末側のカメラ権限を確認。';
      }
    });

    function resetGesture() {
      state = 'idle';
      chargeStart = 0;
      chargeMs = 0;
      chargeOrigin = null;
      chargeBaseSize = 0;
      lastGoodHands = null;
      noHandSince = 0;
      meter.style.width = '0%';
    }

    function coverParams() {
      const cw = canvas.width;
      const ch = canvas.height;
      const vw = video.videoWidth || 1280;
      const vh = video.videoHeight || 720;
      const scale = Math.max(cw / vw, ch / vh);
      const sw = cw / scale;
      const sh = ch / scale;
      const sx = (vw - sw) / 2;
      const sy = (vh - sh) / 2;
      return { cw, ch, vw, vh, scale, sw, sh, sx, sy };
    }

    function videoToCanvasPoint(lm, p) {
      let x = ((lm.x * p.vw) - p.sx) * p.scale;
      const y = ((lm.y * p.vh) - p.sy) * p.scale;
      if (mirror) x = p.cw - x;
      return { x, y, z: lm.z || 0 };
    }

    function drawVideo(p) {
      ctx.save();
      ctx.clearRect(0, 0, p.cw, p.ch);
      if (mirror) {
        ctx.translate(p.cw, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(video, p.sx, p.sy, p.sw, p.sh, 0, 0, p.cw, p.ch);
      ctx.restore();

      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,.18)';
      ctx.fillRect(0, 0, p.cw, p.ch);
      ctx.restore();
    }

    function summarizeHand(landmarks, p) {
      const pts = landmarks.map(lm => videoToCanvasPoint(lm, p));
      const palmIds = [0, 5, 9, 13, 17];
      const center = palmIds.reduce((acc, id) => ({ x: acc.x + pts[id].x, y: acc.y + pts[id].y }), { x: 0, y: 0 });
      center.x /= palmIds.length;
      center.y /= palmIds.length;

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const pt of pts) {
        minX = Math.min(minX, pt.x); minY = Math.min(minY, pt.y);
        maxX = Math.max(maxX, pt.x); maxY = Math.max(maxY, pt.y);
      }
      const size = Math.hypot(maxX - minX, maxY - minY) / Math.hypot(p.cw, p.ch);
      return { pts, center, size, bbox: { minX, minY, maxX, maxY } };
    }

    function chooseTwoHands(results, p) {
      if (!results?.landmarks || results.landmarks.length < 2) return null;
      const hands = results.landmarks.map(lms => summarizeHand(lms, p));
      hands.sort((a, b) => b.size - a.size);
      return hands.slice(0, 2);
    }

    function drawHandGuides(hands) {
      if (!hands) return;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const hand of hands) {
        ctx.strokeStyle = 'rgba(114,231,255,.42)';
        ctx.lineWidth = Math.max(2, canvas.width * .002);
        const links = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
        for (const [a,b] of links) {
          ctx.beginPath(); ctx.moveTo(hand.pts[a].x, hand.pts[a].y); ctx.lineTo(hand.pts[b].x, hand.pts[b].y); ctx.stroke();
        }
        ctx.fillStyle = 'rgba(246,225,109,.75)';
        for (const id of [0, 5, 9, 13, 17]) {
          ctx.beginPath(); ctx.arc(hand.pts[id].x, hand.pts[id].y, Math.max(3, canvas.width * .004), 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.restore();
    }

    function getGesture(hands, t, p) {
      if (!hands) return null;
      const [a, b] = hands;
      const center = { x: (a.center.x + b.center.x) / 2, y: (a.center.y + b.center.y) / 2 };
      const d = dist(a.center, b.center) / Math.min(p.cw, p.ch);
      const avgSize = (a.size + b.size) / 2;
      const body = { x: p.cw * .5, y: p.ch * .78 };
      let dir = { x: center.x - body.x, y: center.y - body.y };
      const len = Math.hypot(dir.x, dir.y) || 1;
      dir = { x: dir.x / len, y: dir.y / len };
      if (dir.y > -0.2) dir.y = -0.75;
      const norm = Math.hypot(dir.x, dir.y) || 1;
      dir = { x: dir.x / norm, y: dir.y / norm };
      return { center, distance: d, avgSize, direction: dir };
    }

    function updateGesture(gesture, t, p) {
      const hasHands = !!gesture;
      const closePose = hasHands && gesture.distance < CLOSE_DIST;
      const openPose = hasHands && gesture.distance > OPEN_DIST;
      const pushed = hasHands && chargeBaseSize > 0 && gesture.avgSize > chargeBaseSize * PUSH_SCALE;

      if (hasHands) {
        lastGoodHands = gesture;
        noHandSince = 0;
      } else if (!noHandSince) {
        noHandSince = t;
      }

      if (state === 'idle') {
        chargeMs = 0;
        meter.style.width = '0%';
        modeLabel.textContent = hasHands ? '両手を近づける' : '手を検出中';
        statusEl.innerHTML = hasHands
          ? '両手は見えています。<strong>手を近づけて止める</strong>と、ため開始。'
          : '両手をカメラに入れてください。暗い部屋だと認識は普通に負けます。';
        if (closePose) {
          state = 'charging';
          chargeStart = t;
          chargeMs = 0;
          chargeOrigin = { ...gesture.center };
          chargeBaseSize = gesture.avgSize;
          chargeDirection = { ...gesture.direction };
        }
        return;
      }

      if (state === 'charging') {
        chargeMs = t - chargeStart;
        const chargeRatio = clamp(chargeMs / MAX_CHARGE_MS, 0, 1);
        meter.style.width = `${Math.round(chargeRatio * 100)}%`;
        modeLabel.textContent = `ため ${Math.min(3, chargeMs / 1000).toFixed(1)}秒`;
        statusEl.innerHTML = `ため中。長くためるほど太くなる。現在の出力 <strong>${Math.round(lerp(28, 130, chargeRatio))}</strong>`;

        if (hasHands) {
          chargeOrigin = { ...gesture.center };
          chargeDirection = { ...gesture.direction };
        }

        const lostAfterCharge = !hasHands && chargeMs > MIN_FIRE_MS && t - noHandSince > 120;
        const fireNow = chargeMs > MIN_FIRE_MS && (openPose || pushed || lostAfterCharge);
        const cancel = !hasHands && chargeMs <= MIN_FIRE_MS && t - noHandSince > 240;

        if (fireNow) {
          fireBeam(gesture || lastGoodHands, p);
          state = 'cooldown';
          setTimeout(() => { if (state === 'cooldown') resetGesture(); }, 360);
        } else if (cancel) {
          resetGesture();
        }
      }
    }

    function fireBeam(gesture, p) {
      const ratio = clamp(chargeMs / MAX_CHARGE_MS, 0, 1);
      const origin = gesture?.center || chargeOrigin || { x: p.cw / 2, y: p.ch * .55 };
      let direction = gesture?.direction || chargeDirection || { x: 0, y: -1 };
      const len = Math.hypot(direction.x, direction.y) || 1;
      direction = { x: direction.x / len, y: direction.y / len };
      const width = lerp(p.cw * .035, p.cw * .14, ratio);
      const length = Math.hypot(p.cw, p.ch) * lerp(.72, 1.12, ratio);
      const power = lerp(.7, 1.8, ratio);
      beams.push({ t0: now(), origin: { ...origin }, direction, width, length, power, ratio });

      const count = Math.round(lerp(26, 82, ratio));
      for (let i = 0; i < count; i++) {
        const angle = Math.atan2(direction.y, direction.x) + (Math.random() - .5) * Math.PI * .55;
        const speed = lerp(3, 16, Math.random()) * (1 + ratio);
        particles.push({
          x: origin.x + (Math.random() - .5) * width * .8,
          y: origin.y + (Math.random() - .5) * width * .8,
          vx: Math.cos(angle) * speed + (Math.random() - .5) * 6,
          vy: Math.sin(angle) * speed + (Math.random() - .5) * 6,
          life: lerp(280, 760, Math.random()) * (1 + ratio * .35),
          age: 0,
          r: lerp(2, 8, Math.random()) * (1 + ratio),
        });
      }

      flash.style.opacity = String(lerp(.12, .34, ratio));
      setTimeout(() => { flash.style.opacity = '0'; }, 40);
      if (navigator.vibrate) navigator.vibrate(Math.round(lerp(25, 85, ratio)));
    }

    function drawCharge(t, p) {
      if (state !== 'charging' || !chargeOrigin) return;
      const ratio = clamp(chargeMs / MAX_CHARGE_MS, 0, 1);
      const radius = lerp(p.cw * .035, p.cw * .12, ratio);
      const pulse = 1 + Math.sin(t * .018) * .06;
      const x = chargeOrigin.x;
      const y = chargeOrigin.y;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const grad = ctx.createRadialGradient(x, y, radius * .08, x, y, radius * 1.7 * pulse);
      grad.addColorStop(0, 'rgba(255,255,255,.98)');
      grad.addColorStop(.18, 'rgba(246,225,109,.85)');
      grad.addColorStop(.48, 'rgba(114,231,255,.55)');
      grad.addColorStop(1, 'rgba(114,231,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius * 1.7 * pulse, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 4; i++) {
        const rr = radius * (.9 + i * .34 + Math.sin(t * .004 + i) * .05);
        ctx.strokeStyle = `rgba(246,225,109,${.36 - i * .055})`;
        ctx.lineWidth = Math.max(2, radius * .035);
        ctx.beginPath();
        ctx.arc(x, y, rr, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (Math.random() < .72) {
        const a = Math.random() * Math.PI * 2;
        const rr = radius * lerp(.2, 1.45, Math.random());
        particles.push({
          x: x + Math.cos(a) * rr,
          y: y + Math.sin(a) * rr,
          vx: -Math.cos(a) * lerp(.8, 4.8, Math.random()),
          vy: -Math.sin(a) * lerp(.8, 4.8, Math.random()),
          life: lerp(180, 420, Math.random()),
          age: 0,
          r: lerp(1.2, 4.5, Math.random()) * (1 + ratio),
        });
      }
      ctx.restore();
    }

    function drawBeams(t, p) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (let i = beams.length - 1; i >= 0; i--) {
        const b = beams[i];
        const age = t - b.t0;
        const k = age / FIRE_DURATION;
        if (k >= 1) { beams.splice(i, 1); continue; }
        const fade = Math.pow(1 - k, .58);
        const width = b.width * (1 + Math.sin(t * .03) * .04) * fade;
        const ox = b.origin.x, oy = b.origin.y;
        const ex = ox + b.direction.x * b.length;
        const ey = oy + b.direction.y * b.length;
        const nx = -b.direction.y;
        const ny = b.direction.x;

        const grad = ctx.createLinearGradient(ox, oy, ex, ey);
        grad.addColorStop(0, `rgba(255,255,255,${.92 * fade})`);
        grad.addColorStop(.18, `rgba(246,225,109,${.78 * fade})`);
        grad.addColorStop(.62, `rgba(114,231,255,${.64 * fade})`);
        grad.addColorStop(1, `rgba(80,153,255,0)`);

        ctx.lineCap = 'round';
        ctx.strokeStyle = `rgba(114,231,255,${.22 * fade})`;
        ctx.lineWidth = width * 1.9;
        ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

        ctx.strokeStyle = grad;
        ctx.lineWidth = width;
        ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

        ctx.strokeStyle = `rgba(255,255,255,${.88 * fade})`;
        ctx.lineWidth = width * .26;
        ctx.beginPath(); ctx.moveTo(ox + nx * width * .07, oy + ny * width * .07); ctx.lineTo(ex, ey); ctx.stroke();

        for (let j = 0; j < 5; j++) {
          const side = j % 2 === 0 ? 1 : -1;
          const wobble = Math.sin(t * .014 + j * 2.1) * width * .32;
          ctx.strokeStyle = `rgba(246,225,109,${.24 * fade})`;
          ctx.lineWidth = Math.max(2, width * .055);
          ctx.beginPath();
          ctx.moveTo(ox + nx * side * width * .22, oy + ny * side * width * .22);
          ctx.quadraticCurveTo(
            ox + b.direction.x * b.length * .44 + nx * wobble,
            oy + b.direction.y * b.length * .44 + ny * wobble,
            ex + nx * side * width * .1,
            ey + ny * side * width * .1
          );
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawParticles(dt) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.age += dt;
        if (p.age >= p.life) { particles.splice(i, 1); continue; }
        const k = p.age / p.life;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= .985;
        p.vy *= .985;
        const a = (1 - k) * .82;
        const r = p.r * (1 + k * 1.3);
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.2);
        g.addColorStop(0, `rgba(255,255,255,${a})`);
        g.addColorStop(.35, `rgba(246,225,109,${a * .7})`);
        g.addColorStop(1, 'rgba(114,231,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    let lastFrameT = now();
    function loop(t) {
      if (!running) return;
      resizeCanvas();
      const p = coverParams();
      drawVideo(p);

      let hands = null;
      if (video.readyState >= 2 && video.currentTime !== lastVideoTime && handLandmarker) {
        lastVideoTime = video.currentTime;
        const results = handLandmarker.detectForVideo(video, t);
        hands = chooseTwoHands(results, p);
      }

      const gesture = getGesture(hands, t, p);
      updateGesture(gesture, t, p);

      drawHandGuides(hands);
      drawCharge(t, p);
      drawBeams(t, p);
      const dt = Math.min(34, t - lastFrameT || 16);
      drawParticles(dt);
      lastFrameT = t;

      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
